<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="description" content="Nim fundamentals: Template. A tutorial for absolute beginners.">
  <meta name="author" content="Elucian Moise">
  <meta name="keywords" content="nim, lang, language, syntax, tutorial">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- Website title -->
  <title>Nim Template</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <!-- Icon -->
  <link rel="icon" type="image/png"  href="/images/favicon.ico">
  <!-- Prism Highlighter -->
  <link rel="stylesheet" href="/prism.css">
  <script src="/prism.js"></script>
  <!-- custom css -->
  <link rel="stylesheet" href="/sage.css">
  </head>
<body>

<main class="container">

<!-- header -->
<header id="dynamic-header" class="container-fluid pb-2"></header>

<h2>Nim Template</h2>


<div class="alert alert-secondary shadow-sm">
Work in progress!
</div>

<pre class=" line-numbers"><code class="language-nim">
// code example to be replaced
</code></code></pre>

<!--two columns pattern-->
<div class="row">
<!-- first column -->
<div class="column col-md-6 panel">
<div class="panel-heading">example</div>
<div class="panel-body">
<pre class="code-panel line-numbers">
<code class="language-nim">#!/bin/bash
echo "hello"
</code></pre>
</div>
</div>
<!-- second column -->
<div class="column col-md-6 panel">
<div class="panel-heading">console</div>
<div class="panel-body">
<pre class="code-panel">
<code class="language-output">~/bash-repl$ bash  hello.sh
hello world
$
</code></pre>
</div>
</div>
</div>

<!-- simple table-->
<table class="table table-bordered table-striped table-dark"  style="width: 100%;">
<tr>    
<th>Symbol</th>
<th>Description</th>
<th>Example</th>
<th>Result</th>
</tr></thead>

<!-- work in progress-->

<hr>

<!-- Footer -->
<footer class="footer copyright">
  <p class="x-small text-secondary mb-0">&copy; 2026 Sage-Code Laboratory</p>
</footer>
</main>
<script src="/sage.js"></script>
</body>
</html>
