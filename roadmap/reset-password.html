<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="description" content="Roadmap password reset and recovery page for Supabase authentication.">
    <meta name="author" content="Sage-Code Laboratory">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow">
    <title>Roadmap Reset Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/png" href="/assets/images/favicon.ico">
    <link rel="stylesheet" href="/assets/css/sage.css">
  </head>
  <body>
    <div class="container">
      <header id="dynamic-header" class="container-fluid pb-2"></header>

      <section class="hero-blackboard mt-2">
        <div class="blackboard-content">
          <h1 class="chalk-text">Reset Password</h1>
          <p class="chalk-body mt-1">Send a Supabase recovery email, then return here to create a new password.</p>
        </div>
      </section>

      <section class="container my-4" aria-label="Password recovery">
        <div class="card-slate p-4">
          <div id="reset-request-panel">
            <form id="roadmap-reset-request-form">
              <div class="mb-3">
                <label for="reset-email" class="form-label">Email</label>
                <input id="reset-email" name="email" type="email" class="form-control" placeholder="you@example.com" autocomplete="email">
              </div>
              <div class="action-buttons mt-3">
                <button type="submit" class="first-page-nav-btn action-button first-page-nav-btn-login" aria-label="Send password reset email">
                  <i class="bi bi-envelope-arrow-up" aria-hidden="true"></i>
                  <span>Send Reset Email</span>
                </button>
              </div>
            </form>
          </div>

          <div id="reset-password-panel" hidden>
            <form id="roadmap-reset-form">
              <div class="alert alert-info mb-3">
                A recovery session was detected. Create your new password below.
              </div>
              <div class="mb-3">
                <label for="reset-password" class="form-label">Password</label>
                <div class="input-group">
                  <input id="reset-password" name="password" type="password" class="form-control" placeholder="Create a new password" autocomplete="new-password">
                  <button type="button" class="btn btn-outline-secondary" data-password-target="reset-password" aria-label="Show or hide password" aria-pressed="false">
                    <i class="bi bi-eye" aria-hidden="true"></i>
                  </button>
                </div>
              </div>
              <div class="mb-3">
                <label for="reset-confirm-password" class="form-label">Confirm Password</label>
                <div class="input-group">
                  <input id="reset-confirm-password" name="confirm_password" type="password" class="form-control" placeholder="Confirm the new password" autocomplete="new-password">
                  <button type="button" class="btn btn-outline-secondary" data-password-target="reset-confirm-password" aria-label="Show or hide password confirmation" aria-pressed="false">
                    <i class="bi bi-eye" aria-hidden="true"></i>
                  </button>
                </div>
              </div>
              <div class="action-buttons mt-3">
                <button type="submit" class="first-page-nav-btn action-button first-page-nav-btn-register" aria-label="Update password">
                  <i class="bi bi-shield-lock" aria-hidden="true"></i>
                  <span>Update Password</span>
                </button>
              </div>
            </form>
          </div>

          <div id="auth-status" class="alert mt-3" hidden></div>

          <div class="alert alert-warning mt-4 mb-0">
            <strong>Note:</strong> If you do not have an account yet, use the registration page instead.
          </div>
        </div>
      </section>

      <footer class="footer copyright">
        <p class="x-small text-secondary mb-0">&copy; 2026 Sage-Code Laboratory</p>
      </footer>
    </div>

    <script src="/assets/js/supabase-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/supabase-client.js"></script>
    <script src="/assets/js/roadmap-state.js"></script>
    <script src="/assets/js/roadmap-auth.js"></script>
    <script src="/assets/js/sage.js"></script>
  </body>
</html>
